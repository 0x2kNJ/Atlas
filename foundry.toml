[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/openzeppelin-contracts/lib/forge-std/src/"
]
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
base        = "${BASE_RPC_URL}"
arbitrum    = "${ARBITRUM_RPC_URL}"
mainnet     = "${MAINNET_RPC_URL}"

[etherscan]
base     = { key = "${BASESCAN_API_KEY}", chain = 8453  }
arbitrum = { key = "${ARBISCAN_API_KEY}",  chain = 42161 }
mainnet  = { key = "${ETHERSCAN_API_KEY}", chain = 1     }
